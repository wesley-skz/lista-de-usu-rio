<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Convidados</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Lista de Convidados</h1>
        
        <div class="tabs">
            <button class="tab-button" onclick="openTab('convidados')">Convidados</button>
            <button class="tab-button" onclick="openTab('letraA')">Começam com A</button>
            <button class="tab-button" onclick="openTab('maisCinco')">Mais de 5 Letras</button>
        </div>

        <div id="convidados" class="tab-content">
            <h2>Lista de Convidados</h2>
            <ul id="convidados-list"></ul>
        </div>

        <div id="letraA" class="tab-content">
            <h2>Convidados que começam com A</h2>
            <ul id="letraA-list"></ul>
        </div>

        <div id="maisCinco" class="tab-content">
            <h2>Convidados com mais de 5 letras</h2>
            <ul id="maisCinco-list"></ul>
        </div>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
