<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Convidados</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Lista de Evento</h1>
        
        <div class="tabs">
            <button onclick="showTab('todos')">Todos os Convidados</button>
            <button onclick="showTab('letra-a')">Iniciam com "A"</button>
            <button onclick="showTab('longos')">Mais de 5 Letras</button>
        </div>

        <hr>

        <div id="todos" class="tab-content active">
            <h2>Todos os Convidados</h2>
            <ul id="lista-todos"></ul>
        </div>

        <div id="letra-a" class="tab-content">
            <h2>Nomes com a Letra "A"</h2>
            <p id="contagem-a" class="badge"></p>
            <ul id="lista-a"></ul>
        </div>

        <div id="longos" class="tab-content">
            <h2>Nomes Longos (+5 letras)</h2>
            <p id="contagem-longos" class="badge"></p>
            <ul id="lista-longos"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
